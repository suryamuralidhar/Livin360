<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title id="pageTitle"></title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
<script src="config.js"></script>

</head>


<body>

<div id="panorama"></div>

<div class="space-bar" id="spaceBar"></div>

<div class="ui-buttons">

<button onclick="arMode()">📱</button>

<button onclick="vrMode()">🥽</button>

<button onclick="openFullscreen()">⛶</button>

</div>


<div id="mobilePopup">

<div class="popupBox">

<p id="popupText"></p>

<button onclick="closePopup()" id="popupButton"></button>

</div>

</div>


<script>

/* APPLY CONFIG VALUES */

document.title = CONFIG.title;
document.getElementById("pageTitle").innerText = CONFIG.title;
document.getElementById("spaceBar").innerText = CONFIG.heading;
document.getElementById("popupText").innerHTML = CONFIG.popupText;
document.getElementById("popupButton").innerText = CONFIG.popupButton;


/* VIEWER */

var viewer = pannellum.viewer('panorama', {

"type": "equirectangular",
"panorama": CONFIG.panoramaImage,
"autoLoad": true,
"friction": CONFIG.dragFriction

});


/* FULLSCREEN */

function openFullscreen(){

var elem = document.getElementById("panorama");

if (elem.requestFullscreen) {
elem.requestFullscreen();
}

}


/* DUMMY BUTTONS */

function arMode(){}

function vrMode(){}


/* CLOSE POPUP */

function closePopup(){

document.getElementById("mobilePopup").style.display="none";

}


/* MOBILE CHECK */

setTimeout(function(){

if(window.innerWidth < CONFIG.mobileWidth){

document.getElementById("mobilePopup").style.display="flex";

}

},CONFIG.popupDelay);

</script>

</body>
</html>
