<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>360 Viewer</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>

<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<style>

html,body{
margin:0;
height:100%;
overflow:hidden;
font-family:Segoe UI, sans-serif;
}

#panorama{
width:100%;
height:100vh;
}

.space-bar{
position:fixed;
bottom:0;
left:0;
width:100%;
padding:16px;
text-align:center;
font-size:18px;
background:rgba(0,0,0,0.5);
color:white;
}

.ui-buttons{
position:fixed;
right:20px;
bottom:100px;
display:flex;
flex-direction:column;
gap:15px;
}

.ui-buttons button{
width:55px;
height:55px;
border-radius:50%;
border:none;
font-size:22px;
color:white;
background:rgba(0,0,0,0.5);
cursor:pointer;
}

#musicDebug{
position:fixed;
top:10px;
left:10px;
background:black;
color:#00ff9c;
padding:8px 12px;
font-family:monospace;
font-size:12px;
z-index:99999;
border-radius:6px;
opacity:0.8;
}

</style>

</head>

<body>

<div id="panorama"></div>

<audio id="bgMusic"></audio>

<div id="musicDebug">Music Debug: Initializing...</div>

<div class="space-bar" id="spaceBar"></div>

<div class="ui-buttons">
<button onclick="openFullscreen()">⛶</button>
</div>

<script src="config.js"></script>
<script src="script.js"></script>

</body>
</html>
